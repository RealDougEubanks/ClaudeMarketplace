name: Skills Marketplace CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Validation
  # ──────────────────────────────────────────────
  validate:
    name: Validate skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all skill directories
        run: |
          errors=0
          for dir in skills/*/; do
            [ -d "$dir" ] || continue
            echo "::group::Validating $(basename "$dir")"
            if ! ./scripts/validate.sh "$dir"; then
              errors=$((errors + 1))
            fi
            echo "::endgroup::"
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors skill(s) failed structure validation"
            exit 1
          fi

  schema:
    name: Validate metadata schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate metadata.json files
        run: |
          errors=0
          for meta in skills/*/metadata.json; do
            [ -f "$meta" ] || continue
            echo "::group::Schema check: $meta"
            if ! check-jsonschema --schemafile schema/metadata.schema.json "$meta"; then
              errors=$((errors + 1))
            fi
            echo "::endgroup::"
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors metadata file(s) failed schema validation"
            exit 1
          fi

      - name: Validate JSON syntax in registry
        run: python3 -c "import json; json.load(open('skills/registry.json'))"

  registry:
    name: Check registry consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check registry matches skill directories
        run: ./scripts/check-registry.sh

  # ──────────────────────────────────────────────
  # Stage 2: Security scanning
  # ──────────────────────────────────────────────
  prompt-safety:
    name: Scan prompts for safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run prompt safety scanner
        run: ./scripts/scan-prompts.sh

  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          errors=0
          for script in scripts/*.sh; do
            echo "::group::ShellCheck: $script"
            if ! shellcheck "$script"; then
              errors=$((errors + 1))
            fi
            echo "::endgroup::"
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors script(s) failed ShellCheck"
            exit 1
          fi

  secrets:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

  # ──────────────────────────────────────────────
  # Stage 3: PR labeling (PRs only)
  # ──────────────────────────────────────────────
  label-tools:
    name: Label PR with requested tools
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [validate, schema]
    steps:
      - uses: actions/checkout@v4

      - name: Detect tools used by changed skills
        id: detect
        run: |
          tools=""
          for meta in skills/*/metadata.json; do
            [ -f "$meta" ] || continue
            skill_tools=$(python3 -c "
          import json
          data = json.load(open('$meta'))
          for t in data.get('tools', []):
              print(t)
          " 2>/dev/null || true)
            tools="$tools $skill_tools"
          done
          # Deduplicate
          unique=$(echo "$tools" | tr ' ' '\n' | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')
          echo "tools=$unique" >> "$GITHUB_OUTPUT"
          echo "Detected tools: $unique"

      - name: Comment tool summary on PR
        if: steps.detect.outputs.tools != ''
        uses: actions/github-script@v7
        with:
          script: |
            const tools = '${{ steps.detect.outputs.tools }}'.split(',');
            const highRisk = ['Bash'];
            const flagged = tools.filter(t => highRisk.includes(t));
            let body = '### Tools requested by skills in this PR\n\n';
            body += tools.map(t => `- \`${t}\``).join('\n');
            if (flagged.length > 0) {
              body += '\n\n⚠️ **High-risk tools detected:** ' + flagged.map(t => `\`${t}\``).join(', ');
              body += '\nPlease review the `skill.md` carefully for safe usage of these tools.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

name: Skills Marketplace CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Validation
  # ──────────────────────────────────────────────
  validate:
    name: Validate skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all skill directories
        run: |
          errors=0
          for dir in skills/*/; do
            [ -d "$dir" ] || continue
            echo "::group::Validating $(basename "$dir")"
            if ! ./scripts/validate.sh "$dir"; then
              errors=$((errors + 1))
            fi
            echo "::endgroup::"
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors skill(s) failed structure validation"
            exit 1
          fi

  schema:
    name: Validate metadata schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate metadata.json files
        run: |
          errors=0
          for meta in skills/*/metadata.json; do
            [ -f "$meta" ] || continue
            echo "::group::Schema check: $meta"
            if ! check-jsonschema --schemafile schema/metadata.schema.json "$meta"; then
              errors=$((errors + 1))
            fi
            echo "::endgroup::"
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors metadata file(s) failed schema validation"
            exit 1
          fi

      - name: Validate JSON syntax in registry
        run: python3 -c "import json; json.load(open('skills/registry.json'))"

  registry:
    name: Check registry consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check registry matches skill directories
        run: ./scripts/check-registry.sh

  check-commands:
    name: Check for duplicate slash commands
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect duplicate commands across skills
        run: |
          python3 - << 'PYEOF'
          import json, glob, sys
          from collections import defaultdict

          seen = defaultdict(list)
          for f in sorted(glob.glob('skills/*/metadata.json')):
              d = json.load(open(f))
              for cmd in d.get('commands', []):
                  seen[cmd].append(f)

          dupes = {k: v for k, v in seen.items() if len(v) > 1}
          if dupes:
              for cmd, files in dupes.items():
                  print(f'::error::Duplicate command {cmd} claimed by: {", ".join(files)}')
              sys.exit(1)
          print(f'OK: {len(seen)} unique command(s) across {len(glob.glob("skills/*/metadata.json"))} skill(s). No duplicates.')
          PYEOF

  validate-registry-metadata:
    name: Cross-validate registry vs metadata.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify registry entries match metadata.json
        run: |
          python3 - << 'PYEOF'
          import json, sys
          from pathlib import Path

          registry = json.load(open('skills/registry.json'))
          # Fields where registry value must match metadata value (when metadata has it)
          SYNCED_FIELDS = ['description', 'version', 'tags', 'category']
          errors = 0

          for entry in registry.get('skills', []):
              name = entry['name']
              meta_path = Path('skills') / name / 'metadata.json'
              if not meta_path.exists():
                  # Already caught by check-registry.sh; skip here
                  continue
              meta = json.load(open(meta_path))
              skill_ok = True
              for field in SYNCED_FIELDS:
                  meta_val = meta.get(field)
                  registry_val = entry.get(field)
                  # Only flag when metadata has the field — registry must then match it
                  if meta_val is None:
                      continue
                  # Normalize lists for order-independent comparison
                  if isinstance(meta_val, list):
                      meta_val = sorted(meta_val)
                      registry_val = sorted(registry_val) if isinstance(registry_val, list) else registry_val
                  if registry_val != meta_val:
                      print(f'::error::skills/{name}: registry.json {field}={json.dumps(entry.get(field))} '
                            f'does not match metadata.json {field}={json.dumps(meta.get(field))}')
                      errors += 1
                      skill_ok = False
              if skill_ok:
                  print(f'  OK  {name}')

          if errors:
              print(f'\nFAILED: {errors} registry/metadata mismatch(es). '
                    'Update registry.json to match metadata.json.')
              sys.exit(1)
          print('\nPASSED: All registry entries match their metadata.json.')
          PYEOF

  # ──────────────────────────────────────────────
  # Stage 2: Security & quality scanning
  # ──────────────────────────────────────────────
  prompt-safety:
    name: Scan prompts for safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run prompt safety scanner
        run: ./scripts/scan-prompts.sh

  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          errors=0
          for script in scripts/*.sh; do
            echo "::group::ShellCheck: $script"
            if ! shellcheck "$script"; then
              errors=$((errors + 1))
            fi
            echo "::endgroup::"
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors script(s) failed ShellCheck"
            exit 1
          fi

  secrets:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

  lint-markdown:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Lint skill and root Markdown files
        run: markdownlint-cli2 "skills/**/*.md" "*.md"

  # ──────────────────────────────────────────────
  # Stage 3: PR-only checks
  # ──────────────────────────────────────────────
  label-tools:
    name: Summarize tools in changed skills
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [validate, schema]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect tools used by changed skills
        id: detect
        run: |
          # Scope to metadata.json files changed in this PR only
          changed_metas=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
            | grep '^skills/.*/metadata\.json$' || true)

          if [ -z "$changed_metas" ]; then
            echo "No skill metadata changes in this PR."
            echo "tools=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tools=""
          while IFS= read -r meta; do
            [ -f "$meta" ] || continue
            skill_tools=$(python3 -c "
          import json
          data = json.load(open('$meta'))
          for t in data.get('tools', []):
              print(t)
          " 2>/dev/null || true)
            tools="$tools $skill_tools"
          done <<< "$changed_metas"

          unique=$(echo "$tools" | tr ' ' '\n' | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')
          echo "tools=$unique" >> "$GITHUB_OUTPUT"
          echo "Detected tools in changed skills: $unique"

      - name: Comment tool summary on PR
        if: steps.detect.outputs.tools != ''
        uses: actions/github-script@v7
        with:
          script: |
            const tools = '${{ steps.detect.outputs.tools }}'.split(',').filter(Boolean);
            const highRisk = ['Bash'];
            const flagged = tools.filter(t => highRisk.includes(t));
            let body = '### Tools requested by changed skills in this PR\n\n';
            body += tools.map(t => `- \`${t}\``).join('\n');
            if (flagged.length > 0) {
              body += '\n\n⚠️ **High-risk tools detected:** ' + flagged.map(t => `\`${t}\``).join(', ');
              body += '\nPlease review the `skill.md` carefully for safe usage of these tools.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  version-bump:
    name: Enforce version bump on skill updates
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bumps for changed skills
        env:
          BASE_REF: ${{ github.base_ref }}
        run: python3 scripts/check-version-bump.py

name: Skills Marketplace CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Validation
  # ──────────────────────────────────────────────
  validate:
    name: Validate skill structure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate all skill directories
        run: |
          errors=0
          for dir in skills/*/; do
            [ -d "$dir" ] || continue
            echo "::group::Validating $(basename "$dir")"
            if ! ./scripts/validate.sh "$dir"; then
              errors=$((errors + 1))
            fi
            echo "::endgroup::"
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors skill(s) failed structure validation"
            exit 1
          fi

  schema:
    name: Validate metadata schemas
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check-jsonschema
        run: pip install "check-jsonschema==0.29.3"

      - name: Validate metadata.json files
        run: |
          errors=0
          for meta in skills/*/metadata.json; do
            [ -f "$meta" ] || continue
            echo "::group::Schema check: $meta"
            if ! check-jsonschema --schemafile schema/metadata.schema.json "$meta"; then
              errors=$((errors + 1))
            fi
            echo "::endgroup::"
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors metadata file(s) failed schema validation"
            exit 1
          fi

      - name: Validate JSON syntax in registry
        run: python3 -c "import json, sys; json.load(open(sys.argv[1]))" skills/registry.json

  registry:
    name: Check registry consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check registry matches skill directories
        run: ./scripts/check-registry.sh

  check-commands:
    name: Check for duplicate slash commands
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Detect duplicate commands across skills
        run: python3 scripts/check-commands.py

  validate-registry-metadata:
    name: Cross-validate registry vs metadata.json
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Verify registry entries match metadata.json
        run: python3 scripts/check-registry-metadata.py

  validate-plugin-versions:
    name: Cross-validate plugin.json and marketplace.json versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin.json and marketplace.json match metadata.json
        run: python3 scripts/check-plugin-versions.py

  # ──────────────────────────────────────────────
  # Stage 2: Security & quality scanning
  # ──────────────────────────────────────────────
  prompt-safety:
    name: Scan prompts for safety
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run prompt safety scanner
        run: ./scripts/scan-prompts.sh

  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          errors=0
          for script in scripts/*.sh; do
            echo "::group::ShellCheck: $script"
            if ! shellcheck "$script"; then
              errors=$((errors + 1))
            fi
            echo "::endgroup::"
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors script(s) failed ShellCheck"
            exit 1
          fi

  secrets:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

  lint-markdown:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Lint skill and root Markdown files
        run: markdownlint-cli2 "skills/**/*.md" "*.md"

  test:
    name: Run test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run all tests
        run: bash tests/run-all.sh

  # ──────────────────────────────────────────────
  # Stage 3: PR-only checks
  # ──────────────────────────────────────────────
  label-tools:
    name: Summarize tools in changed skills
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    needs: [validate, schema]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect tools used by changed skills
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Scope to metadata.json files changed in this PR only
          changed_metas=$(git diff --name-only "origin/${BASE_REF}...HEAD" \
            | grep '^skills/.*/metadata\.json$' || true)

          if [ -z "$changed_metas" ]; then
            echo "No skill metadata changes in this PR."
            echo "tools=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tools=""
          while IFS= read -r meta; do
            [ -f "$meta" ] || continue
            skill_tools=$(python3 -c "
          import json, sys
          data = json.load(open(sys.argv[1]))
          for t in data.get('tools', []):
              print(t)
          " "$meta" 2>/dev/null || true)
            tools="$tools $skill_tools"
          done <<< "$changed_metas"

          unique=$(echo "$tools" | tr ' ' '\n' | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')
          echo "tools=$unique" >> "$GITHUB_OUTPUT"
          echo "Detected tools in changed skills: $unique"

      - name: Comment tool summary on PR
        if: steps.detect.outputs.tools != ''
        uses: actions/github-script@v7
        env:
          DETECTED_TOOLS: ${{ steps.detect.outputs.tools }}
        with:
          script: |
            const tools = (process.env.DETECTED_TOOLS || '').split(',').filter(Boolean);
            const highRisk = ['Bash'];
            const flagged = tools.filter(t => highRisk.includes(t));
            let body = '### Tools requested by changed skills in this PR\n\n';
            body += tools.map(t => `- \`${t}\``).join('\n');
            if (flagged.length > 0) {
              body += '\n\n⚠️ **High-risk tools detected:** ' + flagged.map(t => `\`${t}\``).join(', ');
              body += '\nPlease review the `skill.md` carefully for safe usage of these tools.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  version-bump:
    name: Enforce version bump on skill updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bumps for changed skills
        env:
          BASE_REF: ${{ github.base_ref }}
        run: python3 scripts/check-version-bump.py

  scan-exempt-alert:
    name: Alert on .scan-exempt changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for .scan-exempt changes
        id: check
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          changed=$(git diff --name-only "origin/${BASE_REF}...HEAD" \
            | grep '\.scan-exempt$' || true)
          if [ -n "$changed" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "files=$changed" >> "$GITHUB_OUTPUT"
            echo "Changed .scan-exempt files:"
            echo "$changed"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR about .scan-exempt changes
        if: steps.check.outputs.found == 'true'
        uses: actions/github-script@v7
        env:
          EXEMPT_FILES: ${{ steps.check.outputs.files }}
        with:
          script: |
            const files = (process.env.EXEMPT_FILES || '').split('\n').filter(Boolean);
            let body = '### .scan-exempt files changed in this PR\n\n';
            body += files.map(f => '- `' + f + '`').join('\n');
            body += '\n\n**These files control which security scan patterns are suppressed.** ';
            body += 'Please review carefully to ensure exemptions are justified.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  changelog-preview:
    name: Preview changelog entry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog entry
        id: changelog
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          entry=$(./scripts/generate-changelog-entry.sh "${BASE_REF}")
          # Write to file for the next step (multi-line output)
          echo "$entry" > /tmp/changelog-entry.txt
          if [ -n "$entry" ] && [ "$entry" != "No new commits found." ]; then
            echo "has_entry=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_entry=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment changelog preview on PR
        if: steps.changelog.outputs.has_entry == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const entry = fs.readFileSync('/tmp/changelog-entry.txt', 'utf8');
            const marker = '<!-- changelog-preview -->';
            const body = marker + '\n### Changelog Preview\n\n' +
              '```markdown\n' + entry + '```\n\n' +
              '*Auto-generated from commit messages. Update CHANGELOG.md before merge if needed.*';

            // Check for existing comment to update instead of duplicate
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            }

name: Publish Registry

# Only run after CI passes on a push to main.
# workflow_run fires when the named workflow completes; the condition below
# restricts to: (a) successful runs and (b) push events (not PRs).
# Disabled: auto-tagging requires push access, which is blocked while the
# repository is in a disabled state.  Re-enable by uncommenting the trigger.
# on:
#   workflow_run:
#     workflows: ["Skills Marketplace CI"]
#     types: [completed]
#     branches: [main]
on:
  workflow_dispatch:  # manual-only until repo push access is restored

permissions:
  contents: write

jobs:
  publish:
    name: Validate and tag release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate on CI success and push event (not PR runs)
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Check out the exact commit that triggered CI, not whatever HEAD is now
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check-jsonschema
        run: pip install "check-jsonschema==0.29.3"

      - name: Full validation
        run: |
          # Structure
          for dir in skills/*/; do
            ./scripts/validate.sh "$dir"
          done
          # Schema
          for meta in skills/*/metadata.json; do
            check-jsonschema --schemafile schema/metadata.schema.json "$meta"
          done
          # Registry
          ./scripts/check-registry.sh

      - name: Count skills and generate summary
        id: summary
        run: |
          count=$(find skills -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Registry contains $count skill(s)"

      - name: Tag release
        run: |
          # Configure git for tagging
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Auto-increment patch version based on existing tags
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            version="${latest#v}"
            major=$(echo "$version" | cut -d. -f1)
            minor=$(echo "$version" | cut -d. -f2)
            patch=$(echo "$version" | cut -d. -f3)
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "Tagging $next (${{ steps.summary.outputs.count }} skills)"
          git tag -a "$next" -m "Registry update: ${{ steps.summary.outputs.count }} skills" \
            "${{ github.event.workflow_run.head_sha }}"
          git push origin "$next"
